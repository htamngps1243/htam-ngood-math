<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MKZ Archive Node</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0d001a, #2a003f);
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    /* NOISE */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 3px 3px;
        animation: noiseMove 0.3s infinite;
        pointer-events: none;
    }

    /* HIDDEN ARG TEXT IN NOISE */
    body::after {
        content: "THREE SIGNALS • VIII II IV • 2006 • ROOTS /3 • 12/3 • 2→2";
        position: absolute;
        font-size: 10px;
        color: rgba(255,255,255,0.05);
        letter-spacing: 2px;
        bottom: 10px;
        left: 10px;
        user-select: none;
    }

    @keyframes noiseMove {
        0% { transform: translate(0,0); }
        50% { transform: translate(-1px, 1px); }
        100% { transform: translate(1px, -1px); }
    }

    .container {
        position: relative;
        background: rgba(20, 0, 40, 0.85);
        padding: 35px;
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 0 30px rgba(140, 0, 255, 0.4);
        backdrop-filter: blur(6px);
    }

    h2 {
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    .sub {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
        margin-bottom: 20px;
    }

    .code-inputs {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    input {
        width: 42px;
        height: 52px;
        font-size: 24px;
        text-align: center;
        border: none;
        border-radius: 10px;
        outline: none;
        background: #1a002b;
        color: #fff;
        box-shadow: inset 0 0 8px rgba(180, 0, 255, 0.3);
        transition: 0.2s;
    }

    input:focus {
        box-shadow: 0 0 10px rgba(200, 0, 255, 0.8);
        background: #220038;
    }

    button {
        background: linear-gradient(135deg, #6a00ff, #b000ff);
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 0 15px rgba(160, 0, 255, 0.5);
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(200, 0, 255, 0.8);
    }

    .error {
        color: #ff88aa;
        margin-top: 12px;
        display: none;
    }

    /* SECRET HINT (hover to reveal) */
    .hint {
        position: absolute;
        top: -18px;
        right: 10px;
        font-size: 10px;
        color: rgba(255,255,255,0.15);
        cursor: default;
    }

    .hint:hover {
        color: rgba(255,255,255,0.6);
    }
</style>
</head>

<body>

<div class="container">
    <div class="hint" title="not everything is in order">⟡</div>

    <h2>ARCHIVE LOCK</h2>
    <div class="sub">Recovered fragments require reconstruction</div>

    <div class="code-inputs">
        <input maxlength="1" type="text">
        <input maxlength="1" type="text">
        <input maxlength="1" type="text">
        <input maxlength="1" type="text">
        <input maxlength="1" type="text">
        <input maxlength="1" type="text">
    </div>

    <button onclick="checkCode()">DECRYPT</button>
    <div class="error" id="errorMsg">ACCESS DENIED</div>
</div>

<script>
    const inputs = document.querySelectorAll("input");

    inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
            input.value = input.value.replace(/[^0-9]/g, '');
            if (input.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && input.value === "" && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    function checkCode() {
        let code = "";
        inputs.forEach(input => code += input.value);

        const correctCode = "111111";

        if (code === correctCode) {
            window.location.href = "37/82/43/15/94/62/index.html";
        } else {
            document.getElementById("errorMsg").style.display = "block";
        }
    }

    // ARG BONUS: console clue
    console.log("%cMKZ-ARCHIVE-06", "color: #b000ff; font-size: 16px;");
    console.log("Fragments detected:");
    console.log("A: echoes ≠ sources");
    console.log("B: VIII II IV → reversed");
    console.log("C: 2006 split");
    console.log("D: 9 → 3");
    console.log("E: 12 → 4");
    console.log("F: 2 repeats");
    console.log("Final note: reorder everything.");
</script>

</body>
</html>
